name: s14p31a404

services:
  db:
    image: postgres:16-alpine
    container_name: db
    environment:
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    environment:
      TZ: Asia/Seoul
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network
    restart: unless-stopped

  ai-server:
    profiles:
      - local-ai
    build:
      context: ./ai
      dockerfile: ai-server/Dockerfile
    container_name: ai-server
    environment:
      TZ: Asia/Seoul
      SIGN_MODEL_PATH: ${SIGN_MODEL_CONTAINER_PATH:-/models/best_sign_model_v6.pt}
      SIGN_TRAIN_CONFIG_PATH: ${SIGN_TRAIN_CONFIG_CONTAINER_PATH:-/models/train_config_v6.json}
      SIGN_LABEL_MAP_PATH: ${SIGN_LABEL_MAP_CONTAINER_PATH:-/models/label_map_v6.json}
      SIGN_MODEL_MODULE_PATH: ${SIGN_MODEL_MODULE_CONTAINER_PATH:-/models/model.py}
      SIGN_CONFIDENCE_THRESHOLD: ${SIGN_CONFIDENCE_THRESHOLD:-0.80}
      SIGN_NONE_LABEL: ${SIGN_NONE_LABEL:-none}
      SIGN_MODEL_VERSION: ${SIGN_MODEL_VERSION:-}
    volumes:
      - ${SIGN_MODEL_ARTIFACT_PATH:-./ai/model-artifacts}:/models:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import json, sys, urllib.request; data=json.load(urllib.request.urlopen('http://localhost:8000/health', timeout=2)); sys.exit(0 if data.get('modelLoaded') is True else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_URL: ${DB_URL:-jdbc:postgresql://db:5432/appdb}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER}
      AUTH_ACCESS_TOKEN_TTL_SECONDS: ${AUTH_ACCESS_TOKEN_TTL_SECONDS}
      AUTH_REFRESH_TOKEN_TTL_SECONDS: ${AUTH_REFRESH_TOKEN_TTL_SECONDS}
      AUTH_REFRESH_COOKIE_NAME: ${AUTH_REFRESH_COOKIE_NAME}
      AUTH_REFRESH_COOKIE_SECURE: ${AUTH_REFRESH_COOKIE_SECURE}
      AUTH_REFRESH_COOKIE_SAME_SITE: ${AUTH_REFRESH_COOKIE_SAME_SITE}
      AUTH_REFRESH_COOKIE_PATH: ${AUTH_REFRESH_COOKIE_PATH}
      SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS: ${SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      GMS_KEY: ${GMS_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://gms.ssafy.io/gmsapi/generativelanguage.googleapis.com}
      CLOVA_CLIENT_ID: ${CLOVA_CLIENT_ID}
      CLOVA_CLIENT_SECRET: ${CLOVA_CLIENT_SECRET}
      CLOVA_TTS_URL: ${CLOVA_TTS_URL:-https://naveropenapi.apigw.ntruss.com/tts-premium/v1/tts}
      CLOVA_TTS_SPEAKER: ${CLOVA_TTS_SPEAKER:-nara}
      CLOVA_TTS_FORMAT: ${CLOVA_TTS_FORMAT:-mp3}
      CLOVA_STT_URL: ${CLOVA_STT_URL:-https://naveropenapi.apigw.ntruss.com/recog/v1/stt}
      CLOVA_STT_LANGUAGE: ${CLOVA_STT_LANGUAGE:-Kor}
      CLOVA_SPEECH_GRPC_ENDPOINT: ${CLOVA_SPEECH_GRPC_ENDPOINT:-clovaspeech-gw.ncloud.com:50051}
      CLOVA_SPEECH_SECRET_KEY: ${CLOVA_SPEECH_SECRET_KEY:-}
      CLOVA_SPEECH_LANGUAGE: ${CLOVA_SPEECH_LANGUAGE:-ko}
      CLOVA_SPEECH_POC_ENABLED: ${CLOVA_SPEECH_POC_ENABLED:-false}
      CLOVA_SPEECH_POC_AUDIO_PATH: ${CLOVA_SPEECH_POC_AUDIO_PATH:-}
      CLOVA_SPEECH_POC_SKIP_WAV_HEADER: ${CLOVA_SPEECH_POC_SKIP_WAV_HEADER:-false}
      TRANSLATION_STT_MODE: ${TRANSLATION_STT_MODE:-REST}
      SIGN_AI_BASE_URL: ${BACKEND_SIGN_AI_BASE_URL:-http://ai-server:8000}
      SIGN_AI_CONNECT_TIMEOUT: ${SIGN_AI_CONNECT_TIMEOUT:-1s}
      SIGN_AI_READ_TIMEOUT: ${SIGN_AI_READ_TIMEOUT:-1s}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
