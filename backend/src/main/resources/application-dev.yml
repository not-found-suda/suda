security:
  cors:
    allowed-origin-patterns: "${SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS}"

spring:
  datasource:
    url: "${DB_URL}"
    username: "${DB_USERNAME}"
    password: "${DB_PASSWORD}"
  data:
    redis:
      host: "${REDIS_HOST}"
      port: "${REDIS_PORT}"
      password: "${REDIS_PASSWORD}"
  flyway:
    out-of-order: true

auth:
  jwt:
    secret: "${AUTH_JWT_SECRET}"
    issuer: "${AUTH_JWT_ISSUER}"
    access-token-ttl-seconds: "${AUTH_ACCESS_TOKEN_TTL_SECONDS}"
    refresh-token-ttl-seconds: "${AUTH_REFRESH_TOKEN_TTL_SECONDS}"
    refresh-token-cookie-name: "${AUTH_REFRESH_COOKIE_NAME}"
    refresh-token-cookie-secure: "${AUTH_REFRESH_COOKIE_SECURE}"
    refresh-token-cookie-same-site: "${AUTH_REFRESH_COOKIE_SAME_SITE}"
    refresh-token-cookie-path: "${AUTH_REFRESH_COOKIE_PATH}"

ai:
  gemini:
    api-key: ${GMS_KEY}
    model: ${GEMINI_MODEL:gemini-2.5-flash-lite}
    base-url: ${GEMINI_BASE_URL:https://gms.ssafy.io/gmsapi/generativelanguage.googleapis.com}

  clova:
    client-id: ${CLOVA_CLIENT_ID}
    client-secret: ${CLOVA_CLIENT_SECRET}

    tts-url: ${CLOVA_TTS_URL:https://naveropenapi.apigw.ntruss.com/tts-premium/v1/tts}
    speaker: ${CLOVA_TTS_SPEAKER:nara}
    format: ${CLOVA_TTS_FORMAT:mp3}

    stt-url: ${CLOVA_STT_URL:https://naveropenapi.apigw.ntruss.com/recog/v1/stt}
    stt-language: ${CLOVA_STT_LANGUAGE:Kor}

external-api:
  timeout:
    connect: 3s
    read: 10s
